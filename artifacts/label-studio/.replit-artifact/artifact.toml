kind = "web"
previewPath = "/"
title = "Label Studio"
version = "1.0.0"
id = "artifacts/label-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23804

[services.development]
run = "pnpm --filter @workspace/label-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/label-studio", "run", "build" ]
publicDir = "artifacts/label-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23804"
BASE_PATH = "/"
